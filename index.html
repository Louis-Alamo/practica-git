<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Junior Gallery - Git Battle</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-left: 8px solid var(--primary); }
    </style>
</head>
<body>
    <h1>🚀 Galería de Ingeniería en Sistemas</h1>
    <div class="gallery">
        <!-- PERSONA X: El ejemplo inicial -->
        <div class="card">
            <h3>Persona X</h3>
            <p>1er Semestre</p>            
            
            <p>Proyecto: Página web personal</p>

            <p><i>"Hola hice cambios"</i></p>
        </div>
    </div>
</body>
</html>
